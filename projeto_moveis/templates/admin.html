<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin | Gaby Móveis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-container { padding: 50px 8%; background: #f4f4f4; min-height: 100vh; }
        .form-add { background: white; padding: 30px; border-radius: 8px; margin-bottom: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-save { background: #c5a059; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table th, .admin-table td { padding: 15px; border: 1px solid #eee; text-align: left; }
        .btn-delete { color: red; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center;">
    <h1>Painel Administrativo</h1>
    <a href="/logout" style="color: red; text-decoration: none; font-weight: bold;">SAIR (LOGOUT) ×</a>
    </div>
    <div class="admin-container">
        <h1>Painel Administrativo</h1>
        <a href="/" style="display:inline-block; margin-bottom: 20px;">← Voltar para o Site</a>

        <div class="form-add">
            <h3>Cadastrar Novo Projeto</h3>
            <form action="/admin/add" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Nome do Projeto</label>
                    <input type="text" name="nome" required placeholder="Ex: Cozinha Planejada Luxo">
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select name="categoria">
                        <option value="Cozinha">Cozinha</option>
                        <option value="Quarto">Quarto</option>
                        <option value="Banheiro">Banheiro</option>
                        <option value="Sala">Sala</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descrição Curta</label>
                    <textarea name="descricao" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Foto do Projeto</label>
                    <input type="file" name="imagem" accept="image/*" required>
                </div>
                <button type="submit" class="btn-save">CADASTRAR PROJETO</button>
            </form>
        </div>

        <h3>Projetos Atuais</h3>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Imagem</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for movel in moveis %}
                <tr>
                    <td><img src="{{ url_for('static', filename='img/' + movel.imagem_url) }}" width="80"></td>
                    <td>{{ movel.nome }}</td>
                    <td>{{ movel.categoria }}</td>
                    <td>
                        <a href="/admin/delete/{{ movel.id }}" class="btn-delete" onclick="return confirm('Tem certeza?')">Excluir</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

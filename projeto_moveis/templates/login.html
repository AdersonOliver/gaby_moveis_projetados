<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Gaby Móveis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 30px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 8px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; }
        button { background: #c5a059; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body style="background: #f4f4f4;">
    <div class="login-box">
        <h2>Área Restrita</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">ENTRAR</button>
        </form>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p style="color: red; margin-top: 10px;">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
